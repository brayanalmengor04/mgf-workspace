name: Deploy to Railway

on:
  push:
    branches:
      - main

env:
  # Debe coincidir exactamente con el nombre del servicio en Railway (Dashboard → servicio → Settings).
  RAILWAY_SERVICE: mgf-workspace

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Imagen oficial del CLI (bervProject/railway-deploy tiene la imagen Docker rota: "railway: not found").
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: railway up --service=${{ env.RAILWAY_SERVICE }} --detach
