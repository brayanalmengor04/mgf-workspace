name: Deploy to Railway

on:
  push:
    branches:
      - main

env:
  # Debe coincidir exactamente con el nombre del servicio en Railway (Dashboard → servicio → Settings).
  RAILWAY_SERVICE: mgf-workspace

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        # Marketplace Latest: https://github.com/marketplace/actions/railway-deploy
        # 0.2.0-beta falla con "railway: not found" (imagen Docker rota).
        uses: bervProject/railway-deploy@0.1.2-beta
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: ${{ env.RAILWAY_SERVICE }}
          detach: true
